<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Counter</title>



    <style>

        body{
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container{
            background: white;
            padding: 25px;
            width: 400px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }

        textarea{
            width: 100%;
            height: 120px;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
            resize: none;
        }

        .counter{
            margin-top: 10px;
            font-size: 14px;
        }

        .warning{
            color: red;
            font-size: 14px;
            margin-top: 5px;
        }

    </style>
</head>

<body>

    <div class="container">

        <h2>Message Box</h2>

        <p>200 characters max</p>

        <textarea id="message"
        maxlength="200"
        placeholder="Type your message..."></textarea>

        <div class="counter" id="counter">
            0/200 characters
        </div>

        <div class="warning" id="warning"></div>

    </div> <br>

    <div><a href="./contect.html">Contect Form</a></div>


<script>

const textarea = document.getElementById("message");
const counter = document.getElementById("counter");
const warning = document.getElementById("warning");

const maxLength = 200;

textarea.addEventListener("input", function(){

    let textLength = textarea.value.length;

    counter.textContent =
    `${textLength}/${maxLength} characters`;

    if(textLength >= maxLength){
        warning.textContent =
        "Character limit reached!";
    }
    else{
        warning.textContent = "";
    }

});

</script>

</body>
</html>
